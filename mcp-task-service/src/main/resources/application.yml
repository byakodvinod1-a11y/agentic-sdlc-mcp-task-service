server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

app:
  api-key: ${MCP_API_KEY}

mcp:
  allowed-origins: ${MCP_ALLOWED_ORIGINS:http://localhost,http://127.0.0.1}
